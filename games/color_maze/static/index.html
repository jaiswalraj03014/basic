<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calm Rhythm Maze - Anxiety Relief</title>
    <style>
        :root {
            --primary-glow: #4facfe; --primary-bg: #667eea; --secondary-bg: #764ba2;
            --text-color: #ffffff; --ui-bg: rgba(255, 255, 255, 0.1); --ui-border: rgba(255, 255, 255, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif; background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text-color); overflow: hidden;
        }
        .game-container { text-align: center; max-width: 90vw; width: 550px; padding: 20px; }
        .title { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .subtitle { font-size: 1.2rem; opacity: 0.8; margin-bottom: 20px; }
        .game-board {
            position: relative; width: 100%; aspect-ratio: 1 / 1; margin: 20px auto; background: var(--ui-bg);
            border-radius: 15px; border: 2px solid var(--ui-border); backdrop-filter: blur(10px); overflow: hidden;
        }
        .maze {
            position: absolute; width: 100%; height: 100%; display: grid;
            grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); gap: 1px;
        }
        .maze-cell.path { background: rgba(255,255,255,0.05); }
        .maze-cell.wall { background: rgba(0,0,0,0.4); }
        .orb {
            position: absolute; width: 6%; height: 6%; border-radius: 50%;
            background: radial-gradient(circle, var(--primary-glow) 0%, #00f2fe 100%);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.6); transition: all 0.4s ease; z-index: 10;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow { from { box-shadow: 0 0 20px rgba(79, 172, 254, 0.6); } to { box-shadow: 0 0 40px rgba(79, 172, 254, 1); } }
        .rhythm-indicator {
            position: absolute; bottom: 20px; left: 10%; width: 80%; height: 10px;
            background: rgba(0,0,0,0.3); border-radius: 5px; overflow: hidden;
        }
        .rhythm-bar {
            width: 100%; height: 100%; background: var(--primary-glow); transform: translateX(-100%);
            animation-duration: 4s; animation-timing-function: linear; animation-iteration-count: infinite;
        }
        @keyframes sweep { from { transform: translateX(-100%); } to { transform: translateX(0%); } }
        .controls { display: flex; justify-content: space-around; align-items: center; margin: 20px 0; flex-wrap: wrap; gap: 20px; }
        .stats { display: flex; gap: 30px; align-items: center; order: 1; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: var(--primary-glow); }
        .stat-label { font-size: 0.9rem; opacity: 0.7; }
        .start-button {
            background: linear-gradient(45deg, var(--primary-glow), #00f2fe); color: var(--text-color); border: none;
            padding: 15px 40px; border-radius: 30px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; transition: all 0.3s ease; order: 2;
        }
        .start-button:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(79, 172, 254, 0.4); }
        .start-button.hidden { display: none; }
        .tap-area {
            width: 120px; height: 120px; background: var(--ui-bg); border: 3px solid rgba(79, 172, 254, 0.5);
            border-radius: 50%; display: none; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease; user-select: none; order: 2; font-size: 1.2rem; font-weight: bold;
        }
        .tap-area.visible { display: flex; }
        .tap-area:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .tap-area:active { transform: scale(0.95); background: rgba(79, 172, 254, 0.3); }
        .feedback { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.5rem; font-weight: bold; opacity: 0; transition: all 0.5s ease; pointer-events: none; z-index: 100; }
        .feedback.show { opacity: 1; transform: translate(-50%, -50%) translateY(-20px); }
        .feedback.success { color: var(--primary-glow); } .feedback.miss { color: #ff6b6b; }
        .level-complete { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .level-complete.show { opacity: 1; visibility: visible; }
        .level-complete-content { background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%); padding: 40px; border-radius: 20px; text-align: center; }
        @media (max-width: 600px) { .controls { flex-direction: column; } .stats, .start-button, .tap-area { order: 0; } }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="title">Calm Rhythm Maze</h1>
        <p class="subtitle">Guide the orb by tapping in rhythm</p>
        <div class="controls">
            <div class="stats">
                <div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Score</div></div>
                <div class="stat"><div class="stat-value" id="level">1</div><div class="stat-label">Level</div></div>
            </div>
            <button class="start-button" id="startBtn">Start Game</button>
            <div class="tap-area" id="tapArea">TAP</div>
        </div>
        <div class="game-board" id="game-board">
            <div class="maze" id="maze"></div>
            <div class="orb" id="orb"></div>
            <div class="rhythm-indicator"><div class="rhythm-bar" id="rhythmBar"></div></div>
            <div class="feedback" id="feedback"></div>
        </div>
    </div>
    <div class="level-complete" id="levelComplete">
        <div class="level-complete-content">
            <h2>Level Complete!</h2>
            <p>Level <span id="newLevel">2</span></p>
            <button class="start-button" onclick="closeLevelComplete()">Continue</button>
        </div>
    </div>

    <script>
        class RhythmMazeGame {
            constructor() {
                this.sessionId = null; this.isPlaying = false; this.audioContext = null; this.rhythmPattern = [];
                this.patternStartTime = 0; this.position = { x: 1, y: 1 }; this.maze = []; this.score = 0; this.level = 1;
                this.rhythmLoop = null; this.startBtn = document.getElementById('startBtn'); this.tapArea = document.getElementById('tapArea');
                this.initAudio(); this.bindEvents();
            }
            async initAudio() { try { this.audioContext = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { console.log('Audio not supported'); } }
            bindEvents() {
                this.startBtn.addEventListener('click', () => this.startGame());
                this.tapArea.addEventListener('click', (e) => this.handleTap(e));
                this.tapArea.addEventListener('touchstart', (e) => { e.preventDefault(); this.handleTap(e); });
            }
            async startGame() {
                if (this.isPlaying) return;
                if (this.audioContext && this.audioContext.state === 'suspended') { await this.audioContext.resume(); }
                try {
                    const response = await fetch('/api/start-session', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
                    if (!response.ok) throw new Error('Server connection failed');
                    const data = await response.json();
                    this.sessionId = data.session_id; this.maze = data.maze; this.rhythmPattern = data.rhythm_pattern;
                    this.patternStartTime = data.pattern_start_time; this.position = data.position; this.level = data.level; this.score = data.score;
                    this.isPlaying = true; this.renderMaze(); this.updateOrb(); this.startRhythmLoop(); this.updateUI();
                    this.startBtn.classList.add('hidden'); this.tapArea.classList.add('visible');
                } catch (error) { console.error('Start game error:', error); this.showFeedback('Connection Error', 'miss'); }
            }
            renderMaze() {
                const mazeElement = document.getElementById('maze'); mazeElement.innerHTML = '';
                this.maze.forEach(row => {
                    row.forEach(cell => {
                        const cellElement = document.createElement('div');
                        cellElement.className = `maze-cell ${cell === 0 ? 'path' : 'wall'}`;
                        mazeElement.appendChild(cellElement);
                    });
                });
            }
            updateOrb() {
                const orb = document.getElementById('orb'); const boardSize = document.getElementById('game-board').clientWidth;
                const cellSize = boardSize / 10; const orbSize = orb.clientWidth;
                const x = (this.position.x * cellSize) + (cellSize - orbSize) / 2; const y = (this.position.y * cellSize) + (cellSize - orbSize) / 2;
                orb.style.left = x + 'px'; orb.style.top = y + 'px';
            }
            startRhythmLoop() {
                if (!this.isPlaying) { if (this.rhythmLoop) cancelAnimationFrame(this.rhythmLoop); return; }
                const rhythmBar = document.getElementById('rhythmBar');
                const patternDuration = this.rhythmPattern[this.rhythmPattern.length - 1] + this.rhythmPattern[1];
                rhythmBar.style.animation = 'none'; rhythmBar.offsetHeight;
                rhythmBar.style.animation = `sweep ${patternDuration}ms linear infinite`;
            }
            async handleTap(event) {
                if (!this.isPlaying || !this.sessionId) return;
                try {
                    const response = await fetch('/api/tap', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ timestamp: Date.now(), session_id: this.sessionId })
                    });
                    const result = await response.json();
                    if (result.success) {
                        this.position = result.position; this.score = result.score; this.updateOrb(); this.showFeedback(`Perfect!`, 'success');
                        if (result.level_complete) {
                            this.level = result.new_level; this.rhythmPattern = result.new_pattern; this.patternStartTime = result.pattern_start_time;
                            this.showLevelComplete();
                        }
                    } else { this.showFeedback(`Miss`, 'miss'); }
                    this.updateUI();
                } catch (error) { console.error('Tap error:', error); }
            }
            showFeedback(message, type) {
                const feedback = document.getElementById('feedback'); feedback.textContent = message;
                feedback.className = `feedback ${type} show`;
                setTimeout(() => feedback.classList.remove('show'), 1000);
            }
            showLevelComplete() {
                const modal = document.getElementById('levelComplete'); document.getElementById('newLevel').textContent = this.level;
                modal.classList.add('show'); this.isPlaying = false;
            }
            closeLevelComplete() {
                const modal = document.getElementById('levelComplete'); modal.classList.remove('show');
                this.isPlaying = true; this.startRhythmLoop();
            }
            updateUI() {
                document.getElementById('score').textContent = this.score; document.getElementById('level').textContent = this.level;
            }
        }
        let game = null;
        document.addEventListener('DOMContentLoaded', () => { game = new RhythmMazeGame(); });
        function closeLevelComplete() { if (game) game.closeLevelComplete(); }
    </script>
</body>
</html>
